name: Java JUnit QA Test Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  junit-test-gate:
    name: Run JUnit Integration Tests
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Java 17 Development Kit (JDK)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # Step 3: Run JUnit Tests via Maven
      # "|| true" prevents Maven from stopping the pipeline on test failures,
      # allowing our custom Python gate to evaluate and log the exact rate.
      - name: Run Maven Tests
        run: mvn clean test || true

      # Step 4: Quality Gate Evaluation (Parses Surefire JUnit XML reports)
      - name: Evaluate Quality Gate Pass Rate
        id: quality-gate
        shell: python
        run: |
          import os
          import xml.etree.ElementTree as ET

          reports_dir = 'target/surefire-reports'
          total_tests = 0
          total_failures = 0
          total_errors = 0

          print("==========================================")
          print("   EVALUATING AUTOMATED QA PASS RATE   ")
          print("==========================================")

          # Parse every JUnit XML report generated by Maven
          if os.path.exists(reports_dir):
              for file in os.listdir(reports_dir):
                  if file.endswith('.xml'):
                      try:
                          tree = ET.parse(os.path.join(reports_dir, file))
                          root = tree.getroot()
                          total_tests += int(root.attrib.get('tests', 0))
                          total_failures += int(root.attrib.get('failures', 0))
                          total_errors += int(root.attrib.get('errors', 0))
                      except Exception as e:
                          print(f"Error parsing {file}: {e}")
          else:
              print("❌ Error: No Surefire XML reports found in target/surefire-reports")
              exit(1)

          passed = total_tests - (total_failures + total_errors)
          pass_rate = (passed / total_tests) * 100 if total_tests > 0 else 0.0

          print(f"Total JUnit Tests Configured : {total_tests}")
          print(f"Successful Tests             : {passed}")
          print(f"Failed Assertions            : {total_failures}")
          print(f"Execution Errors             : {total_errors}")
          print(f"Calculated QA Pass Rate      : {pass_rate:.2f}%")
          print("------------------------------------------")

          threshold = 90.0

          if pass_rate < threshold:
              print(f"❌ QUALITY GATE FAILED!")
              print(f"The QA pass rate was {pass_rate:.2f}%, which is below the required {threshold}% standard.")
              exit(1)
          else:
              print(f"✅ QUALITY GATE PASSED!")
              print(f"The QA pass rate is {pass_rate:.2f}%, meeting the required {threshold}% standard!")
              exit(0)